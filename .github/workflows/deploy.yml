name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: platform-services-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: hashicorp/setup-terraform@v4
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/target
          key: rust-lint-${{ hashFiles('apps/Cargo.lock') }}
          restore-keys: rust-lint-
      - name: Rust fmt
        working-directory: apps
        run: cargo fmt --check
      - name: Rust clippy
        working-directory: apps
        run: cargo clippy -- -D warnings
      - name: Rust tests
        working-directory: apps
        run: cargo test
      - name: Terraform fmt
        run: terraform fmt -check -recursive infrastructure/terraform/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    concurrency:
      group: platform-services-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: dtolnay/rust-toolchain@stable
      - uses: hashicorp/setup-terraform@v4
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/target
          key: rust-deploy-${{ hashFiles('apps/Cargo.lock') }}
          restore-keys: rust-deploy-
      - name: Install cargo-lambda
        run: pip3 install cargo-lambda
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - name: Deploy
        env:
          STATE_BUCKET: ${{ secrets.STATE_BUCKET }}
        run: bash scripts/deploy.sh

  report:
    if: always()
    needs: [lint-and-test, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - uses: chris-arsenault/platform/.github/actions/report-build@main
        with:
          lint-passed: ${{ needs.lint-and-test.result == 'success' }}
          test-passed: ${{ needs.lint-and-test.result == 'success' }}
