name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.ref == 'refs/heads/main' && 'platform-services-deploy' || format('platform-services-{0}', github.ref) }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        id: rust
        with:
          components: clippy, rustfmt
      - uses: hashicorp/setup-terraform@v4

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/target
          key: rust-${{ steps.rust.outputs.cachekey }}-${{ hashFiles('apps/Cargo.lock') }}
          restore-keys: rust-${{ steps.rust.outputs.cachekey }}-

      - name: Rust fmt
        working-directory: apps
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: apps
        run: cargo clippy -- -D warnings

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Rust tests with coverage
        working-directory: apps
        run: cargo tarpaulin --out lcov --output-dir coverage

      - name: Terraform fmt
        run: terraform fmt -check -recursive infrastructure/terraform/

      # SonarQube
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1

      - uses: chris-arsenault/platform/.github/actions/sonar-scan@main
        continue-on-error: true
        with:
          project-key: platform-services
          sources: apps,infrastructure/terraform
          exclusions: "**/target/**,**/node_modules/**,**/dist/**,**/.terraform/**"
          extra-args: -Dsonar.rust.lcov.reportPaths=apps/coverage/lcov.info

      # Deploy (main only)
      - uses: actions/setup-node@v4
        if: github.ref == 'refs/heads/main'
        with:
          node-version: "24"

      - name: Install cargo-lambda
        if: github.ref == 'refs/heads/main'
        run: pip3 install cargo-lambda

      - uses: aws-actions/configure-aws-credentials@v5
        if: github.ref == 'refs/heads/main'
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1

      - name: Build auth-trigger Lambda
        if: github.ref == 'refs/heads/main'
        working-directory: apps/auth-trigger
        run: npm ci && npm run build

      - name: Build Rust Lambdas
        if: github.ref == 'refs/heads/main'
        working-directory: apps
        run: cargo lambda build --release

      - uses: chris-arsenault/platform/.github/actions/run-migrations@main
        if: github.ref == 'refs/heads/main'
        with:
          project: platform

      - name: Terraform deploy
        if: github.ref == 'refs/heads/main'
        env:
          STATE_BUCKET: ${{ secrets.STATE_BUCKET }}
        run: |
          terraform -chdir=infrastructure/terraform init -reconfigure \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="region=us-east-1" \
            -backend-config="use_lockfile=true"
          terraform -chdir=infrastructure/terraform apply -auto-approve

  report:
    if: always()
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - uses: chris-arsenault/platform/.github/actions/report-build@main
        with:
          lint-passed: ${{ needs.ci.result == 'success' }}
          test-passed: ${{ needs.ci.result == 'success' }}
